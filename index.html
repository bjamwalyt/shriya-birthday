<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shriya ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    scroll-behavior: smooth;
    background: linear-gradient(120deg, #ffdde1, #ee9ca7);
    color: #333;
}

/* Start Screen */
.start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #ffdde1, #ee9ca7);
    z-index: 9999;
    cursor: pointer;
}
.start-box {
    background: white;
    padding: 35px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}
.start-box h1 { color: #b30059; }

/* Sections */
section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
}
h1 {
    color: #b30059;
    font-size: 2.5em;
    margin-bottom: 20px;
}

/* LETTER */
#letter {
    background: linear-gradient(180deg, #fff0f5, #ffe6ee);
    position: relative;
    overflow: hidden;
}

.letter-card {
    background: #fffdfd;
    border-radius: 28px;
    padding: 40px 35px;
    max-width: 700px;
    box-shadow: 0 15px 35px rgba(179, 0, 89, 0.25);
}

#letterText {
    font-size: 1.18em;
    line-height: 1.9;
    color: #444;
}

/* Slideshow */
.slideshow-container {
    width: 90%;
    max-width: 420px;
    overflow: hidden;
    border-radius: 20px;
}
.slides {
    display: flex;
    transition: transform 0.5s ease;
}
.slide {
    min-width: 100%;
    position: relative;
}
.slide img {
    width: 100%;
    border-radius: 20px;
}
.caption {
    position: absolute;
    bottom: 10px;
    width: 100%;
    color: white;
    text-shadow: 1px 1px 6px black;
    opacity: 0;
    transition: opacity 0.5s;
}

/* Hearts */
.heart {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    animation: float 6s linear forwards;
}

.confetti {
    position: fixed;
    top: -20px;
    pointer-events: none;
    animation: elegantFall 10s linear forwards;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
@keyframes elegantFall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- Start -->
<div class="start-screen" onclick="startExperience()">
    <div class="start-box">
        <h1>For Shriya ❤️</h1>
        <p>Tap to begin</p>
    </div>
</div>

<!-- LETTER -->
<section id="letter">
    <h1>My Heartfelt Letter 💌</h1>
    <div class="letter-card">
        <div id="letterText"></div>
    </div>
</section>

<!-- Memory -->
<section>
    <h1>Memories 📸</h1>
    <div class="slideshow-container">
        <div class="slides" id="slides">
            <div class="slide"><img src="photo1.jpeg"><div class="caption">Our first trip 🌸</div></div>
            <div class="slide"><img src="photo2.jpeg"><div class="caption">😄</div></div>
            <div class="slide"><img src="photo3.jpeg"><div class="caption">❤️</div></div>
        </div>
    </div>
</section>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");
let currentSlide = 0;
const captions = document.querySelectorAll(".caption");

function startExperience() {
    document.querySelector(".start-screen").style.display = "none";
    music.volume = 0.4;
    music.play().catch(()=>{});

    setInterval(createHeart, 500);
    setInterval(nextSlide, 3000);

    const letter = `Dear Shriya,

I dont know ki kbhi yeh dekhaga bhi ya nhi but bhut yaad aati h, 
hr time bs tumhara bare me hi sochta rehta hu.

I never wanted to leave.
I never wanted to end, but wanting is not enough.

If wanting were enough I'd still be right here.

My absence wont shake your world, but yours breaks me.
I miss you in songs, in nights, in silence.

I miss you always.

Please come back madam. ❤️`;

    typeWriter(letter, document.getElementById("letterText"), 30);
}

/* Typewriter */
function typeWriter(text, el, speed){
    let i = 0;
    (function write(){
        if(i < text.length){
            el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
            i++;
            setTimeout(write, speed);
        }
    })();
}

/* Hearts */
function createHeart(){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}

/* Slideshow */
function showSlide(i){
    document.getElementById("slides").style.transform = `translateX(-${i*100}%)`;
    captions.forEach((c,idx)=>c.style.opacity = idx===i?1:0);
}
function nextSlide(){
    currentSlide = (currentSlide+1)%captions.length;
    showSlide(currentSlide);
}
showSlide(currentSlide);
</script>

</body>
</html>
